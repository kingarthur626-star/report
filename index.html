<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新莊區 誠字班 執行回報</title>
  <style>
    * { box-shadow: border-box; box-sizing: border-box; }
    body { 
      font-family: "Microsoft JhengHei", Arial, sans-serif; 
      background-color: #f5f7fa; 
      margin: 0; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      min-height: 100vh; 
      padding: 20px 0;
    }
    .container { 
      width: 100%; 
      max-width: 420px; 
      padding: 30px; 
      background: #ffffff; 
      border-radius: 12px; 
      box-shadow: 0 4px 15px rgba(0,0,0,0.08); 
      text-align: center;
    }
    h2 { color: #2c3e50; margin-bottom: 22px; font-size: 22px; font-weight: bold; line-height: 1.4; }
    .input-group { margin-bottom: 16px; text-align: left; }
    label { display: block; margin-bottom: 8px; color: #34495e; font-weight: bold; }
    input[type="text"], input[type="password"], input[type="email"], input[type="date"], input[type="time"], input[type="number"], select { 
      width: 100%; padding: 12px; border: 1px solid #ccd1d9; border-radius: 6px; font-size: 16px; background-color: #f8f9fa; 
    }
    input:focus, select:focus { border-color: #4a90e2; outline: none; background-color: #fff; }
    
    .host-container { display: flex; flex-wrap: wrap; gap: 10px; padding: 5px 0; }
    .host-option { display: flex; align-items: center; background: #f1f2f6; padding: 8px 12px; border-radius: 20px; cursor: pointer; font-size: 15px; transition: 0.2s; }
    .host-option input { margin-right: 6px; width: 16px; height: 16px; }
    .host-option:hover { background: #e4e7ed; }

    .group-container { display: flex; justify-content: space-between; padding: 5px 0; }
    .group-option { display: flex; align-items: center; cursor: pointer; font-size: 16px; }
    .group-option input[type="radio"] { margin-right: 6px; width: 18px; height: 18px; cursor: pointer; }
    
    .menu-btn { width: 100%; padding: 14px; background-color: #ffffff; color: #34495e; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 16px; font-weight: bold; text-align: left; cursor: pointer; margin-bottom: 12px; transition: 0.2s; display: flex; justify-content: space-between; align-items: center; }
    .menu-btn:hover { background-color: #f8fafc; border-color: #cbd5e1; color: #1e293b; }
    .menu-btn.disabled-btn { background-color: #f1f5f9; color: #94a3b8; border-color: #e2e8f0; cursor: not-allowed; }
    .menu-btn.disabled-btn:hover { background-color: #f1f5f9; border-color: #e2e8f0; color: #94a3b8; }
    
    button.action-btn { width: 100%; padding: 12px; background-color: #4a90e2; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    button:disabled { background-color: #a0a0a0; }
    
    .footer-links { margin-top: 20px; display: flex; justify-content: space-between; font-size: 14px; }
    .footer-links a { color: #4a90e2; text-decoration: none; font-weight: bold; }
    .footer-links a:hover { text-decoration: underline; }
    .msg { margin-top: 15px; font-size: 14px; color: #e74c3c; font-weight: bold; min-height: 20px; }
    .hidden { display: none !important; }
    .hint { font-size: 12px; color: #7f8c8d; margin-top: 4px; }
    .info-text { font-size: 16px; background: #e8f4fd; padding: 10px; border-radius: 6px; color: #2c3e50; font-weight: bold; margin-bottom: 12px; text-align: left; }
    .inline-user-box { display: flex; align-items: center; font-size: 16px; font-weight: bold; color: #34495e; margin-bottom: 16px; padding: 10px; background: #e8f4fd; border-radius: 6px; }
    .inline-user-box span { color: #2c3e50; margin-left: 8px; font-weight: normal; }

    /* 查詢清單專用樣式 */
    .report-list { text-align: left; margin-top: 15px; max-height: 350px; overflow-y: auto; padding-right: 5px; }
    .report-item { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; }
    .report-item:hover { border-color: #4a90e2; background: #f0f7ff; }
    .item-header { display: flex; justify-content: space-between; font-size: 13px; color: #7f8c8d; margin-bottom: 6px; }
    .item-title { font-size: 16px; font-weight: bold; color: #2c3e50; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
    .item-detail-summary { font-size: 14px; color: #57606f; margin-top: 4px; }
    .no-data { color: #95a5a6; padding: 40px 0; font-weight: bold; text-align: center; }

    /* 彈出視窗樣式 (Modal) */
    .modal { display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; padding: 15px; }
    .modal-content { background: white; width: 100%; max-width: 380px; padding: 25px; border-radius: 12px; text-align: left; position: relative; }
    .modal-close-btn { position: absolute; top: 12px; right: 15px; font-size: 24px; color: #a4b0be; cursor: pointer; font-weight: bold; }
    .modal-close-btn:hover { color: #57606f; }
    .modal-title { font-size: 18px; font-weight: bold; color: #2c3e50; border-bottom: 2px solid #4a90e2; padding-bottom: 8px; margin-bottom: 15px; }
    .modal-row { display: flex; margin-bottom: 10px; font-size: 15px; line-height: 1.5; }
    .modal-label { font-weight: bold; color: #57606f; width: 130px; flex-shrink: 0; }
    .modal-val { color: #2c3e50; word-break: break-all; }
  </style>
</head>
<body>

<div id="loginPage" class="container">
  <h2>新莊區 誠字班<br>執行回報系統</h2>
  <form onsubmit="submitLogin(); return false;">
    <div class="input-group">
      <label>帳號：</label>
      <input type="text" id="loginUser" required placeholder="請輸入帳號">
    </div>
    <div class="input-group">
      <label>密碼：</label>
      <input type="password" id="loginPass" required placeholder="請輸入密碼">
    </div>
    <button type="submit" class="action-btn" id="loginBtn">登入</button>
  </form>
  <div id="loginMsg" class="msg"></div>
  <div class="footer-links">
    <a href="#" onclick="switchPage('forgot')">忘記密碼</a>
    <a href="#" onclick="switchPage('register')">申請帳號</a>
  </div>
</div>

<div id="registerPage" class="container hidden">
  <h2>申請帳號</h2>
  <form onsubmit="submitRegister(); return false;">
    <div class="input-group">
      <label>組別：</label>
      <div class="group-container">
        <label class="group-option"><input type="radio" name="groupSelect" value="1" onclick="filterTanNames('regTan')"> 第1組</label>
        <label class="group-option"><input type="radio" name="groupSelect" value="2" onclick="filterTanNames('regTan')"> 第2組</label>
        <label class="group-option"><input type="radio" name="groupSelect" value="3" onclick="filterTanNames('regTan')"> 第3組</label>
      </div>
    </div>
    <div class="input-group">
      <label>壇名：</label>
      <select id="regTan" required disabled><option value="">請先圈選組別...</option></select>
    </div>
    <div class="input-group">
      <label>姓名：</label>
      <input type="text" id="regName" required placeholder="請輸入真實姓名">
    </div>
    <div class="input-group">
      <label>帳號：</label>
      <input type="email" id="regUser" required placeholder="例如: example@gmail.com">
    </div>
    <div class="input-group">
      <label>密碼：</label>
      <input type="text" id="regPass" required pattern="[1-9][0-9]*" placeholder="例如: 912345678">
      <div class="hint">請輸入手機號碼，開頭不含0</div>
    </div>
    <button type="submit" class="action-btn" id="regBtn">送出申請</button>
  </form>
  <div id="regMsg" class="msg"></div>
  <div class="footer-links" style="justify-content: flex-end;">
    <a href="#" onclick="switchPage('login')">返回登入</a>
  </div>
</div>

<div id="forgotPage" class="container hidden">
  <h2>忘記密碼 / 變更密碼</h2>
  <form onsubmit="submitForgot(); return false;">
    <div class="input-group">
      <label>組別：</label>
      <div class="group-container">
        <label class="group-option"><input type="radio" name="forgotGroupSelect" value="1" onclick="filterTanNames('forgotTan')"> 第1組</label>
        <label class="group-option"><input type="radio" name="forgotGroupSelect" value="2" onclick="filterTanNames('forgotTan')"> 第2組</label>
        <label class="group-option"><input type="radio" name="forgotGroupSelect" value="3" onclick="filterTanNames('forgotTan')"> 第3組</label>
      </div>
    </div>
    <div class="input-group">
      <label>壇名：</label>
      <select id="forgotTan" required disabled><option value="">請先圈選組別...</option></select>
    </div>
    <div class="input-group">
      <label>姓名：</label>
      <input type="text" id="forgotName" required placeholder="請輸入真實姓名">
    </div>
    <div class="input-group">
      <label>Gmail 郵箱：</label>
      <input type="email" id="forgotUser" required placeholder="請輸入註冊的 Gmail">
    </div>
    <button type="submit" class="action-btn" id="forgotBtn">確認身份並修改密碼</button>
  </form>
  <div id="forgotMsg" class="msg"></div>
  <div class="footer-links" style="justify-content: flex-end;">
    <a href="#" onclick="switchPage('login')">返回登入</a>
  </div>
</div>

<div id="resetPage" class="container hidden">
  <h2>修改新密碼</h2>
  <div class="input-group">
    <label>壇名：</label>
    <div id="resetTanShow" class="info-text">讀取中...</div>
  </div>
  <div class="input-group">
    <label>姓名：</label>
    <div id="resetNameShow" class="info-text">讀取中...</div>
  </div>
  <form onsubmit="submitResetPassword(); return false;">
    <div class="input-group">
      <label>新密碼：</label>
      <input type="password" id="newPass" required placeholder="請輸入新密碼">
      <div class="hint">必須含英文大小寫加數字，至少8碼</div>
    </div>
    <div class="input-group">
      <label>新密碼確認：</label>
      <input type="password" id="newPassConfirm" required placeholder="請再次輸入新密碼">
    </div>
    <button type="submit" class="action-btn" id="resetBtn">確認變更密碼</button>
  </form>
  <div id="resetMsg" class="msg"></div>
</div>

<div id="mainMenuPage" class="container hidden">
  <h2>功能選單</h2>
  <div class="info-text" style="text-align: center;">
    歡迎！<span id="menuUserShow" style="color: #4a90e2;"></span>
  </div>
  <div style="margin-top: 20px;">
    <button class="menu-btn" onclick="switchPage('addReport')"><span>一、新增</span> <span>➔</span></button>
    <button class="menu-btn" onclick="switchPage('queryReport')"><span>二、查詢</span> <span>➔</span></button>
    <button class="menu-btn disabled-btn" disabled><span>三、修改</span> <span>🔒</span></button>
    <button class="menu-btn disabled-btn" disabled><span>四、刪除</span> <span>🔒</span></button>
    <button class="menu-btn disabled-btn" disabled><span>五、組查詢</span> <span>🔒</span></button>
    <button class="menu-btn disabled-btn" disabled><span>六、區查詢</span> <span>🔒</span></button>
  </div>
  <div class="footer-links" style="justify-content: center; margin-top: 25px;">
    <a href="#" onclick="logOut()" style="color: #e74c3c;">登出系統</a>
  </div>
</div>

<div id="addReportPage" class="container hidden">
  <h2>誠字班 執行回報</h2>
  <div class="inline-user-box">填報人：<span id="reportUserShow"></span></div>
  <form onsubmit="submitReportForm(); return false;">
    <div class="input-group">
      <label>活動主辦：</label>
      <div class="host-container">
        <label class="host-option"><input type="radio" name="actHost" value="中心" required> 中心</label>
        <label class="host-option"><input type="radio" name="actHost" value="區"> 區</label>
        <label class="host-option"><input type="radio" name="actHost" value="一組"> 一組</label>
        <label class="host-option"><input type="radio" name="actHost" value="二組"> 二組</label>
        <label class="host-option"><input type="radio" name="actHost" value="三組"> 三組</label>
        <label class="host-option"><input type="radio" name="actHost" value="本壇"> 本壇</label>
      </div>
    </div>
    <div class="input-group">
      <label>活動日期：</label>
      <input type="date" id="actDate" required>
    </div>
    <div class="input-group">
      <label>活動時間：</label>
      <input type="time" id="actTime">
    </div>
    <div class="input-group">
      <label>活動名稱：</label>
      <input type="text" id="actTitle" required placeholder="請填寫活動名稱">
    </div>
    <div class="input-group">
      <label>活動人數：</label>
      <input type="number" id="actPeople" required min="0" placeholder="請手動輸入人數">
    </div>
    <div class="input-group">
      <label>久違道親：</label>
      <input type="number" id="actMiss" required min="0" placeholder="請手動輸入人數">
    </div>
    <button type="submit" class="action-btn" id="reportSubmitBtn">確認送出回報</button>
  </form>
  <div id="reportMsg" class="msg" style="color: #2ecc71;"></div>
  <div class="footer-links">
    <a href="#" onclick="switchPage('menu')">返回主選單</a>
  </div>
</div>

<div id="queryReportPage" class="container hidden">
  <h2 id="queryTitleShow">壇名 回報查詢</h2>
  
  <div id="queryLoadMsg" style="color: #7f8c8d; font-weight: bold; margin: 15px 0;">正在讀取回報紀錄...</div>
  <div id="reportListContainer" class="report-list"></div>
  
  <div class="footer-links" style="margin-top: 25px;">
    <a href="#" onclick="switchPage('menu')">返回主選單</a>
  </div>
</div>

<div id="detailModal" class="modal hidden">
  <div class="modal-content">
    <span class="modal-close-btn" onclick="closeModal()">&times;</span>
    <div class="modal-title">回報詳細內容</div>
    <div class="modal-row"><div class="modal-label">活動日期：</div><div id="mDate" class="modal-val"></div></div>
    <div class="modal-row"><div class="modal-label">活動時間：</div><div id="mTime" class="modal-val"></div></div>
    <div class="modal-row"><div class="modal-label">活動主辦：</div><div id="mHost" class="modal-val"></div></div>
    <div class="modal-row"><div class="modal-label">活動名稱：</div><div id="mTitle" class="modal-val"></div></div>
    <div class="modal-row"><div class="modal-label">活動人數：</div><div id="mPeople" class="modal-val"></div></div>
    <div class="modal-row"><div class="modal-label">久違道親：</div><div id="mLost" class="modal-val"></div></div>
    <div class="modal-row" style="border-top: 1px dashed #e2e8f0; padding-top: 8px; margin-top: 8px; font-size: 13px;">
      <div class="modal-label" style="color:#a4b0be">填報人員：</div><div id="mReporter" class="modal-val" style="color:#a4b0be; font-weight: bold; margin-right: 15px;"></div>
    </div>
    <div class="modal-row" style="font-size: 12px;">
      <div class="modal-label" style="color:#a4b0be">填報時間：</div><div id="mTimestamp" class="modal-val" style="color:#a4b0be"></div>
    </div>
  </div>
</div>


<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbxvYMPUj3nXr3ej18vygbp014HawqHI6NVBCSF0d48-byZZ_WpfA2xoygatac0s7qW_/exec";
  
  let allTanNames = [];
  let currentResetToken = "";
  let currentUserInfo = { group: "", tanName: "", realName: "" };
  let myFetchedReports = [];

  window.onload = function() {
    fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "getTanNames" }) })
    .then(res => res.json())
    .then(res => { if(res.success) { allTanNames = res.data; } })
    .catch(() => {});
  };

  function checkPasswordStrength(password) {
    const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/;
    return passwordRegex.test(password);
  }

  function filterTanNames(elementId) {
    const isForgot = elementId === 'forgotTan';
    const radioName = isForgot ? 'forgotGroupSelect' : 'groupSelect';
    const checkedRadio = document.querySelector(`input[name="${radioName}"]:checked`);
    if (!checkedRadio) return;
    
    const selectedGroup = checkedRadio.value;
    const selectElem = document.getElementById(elementId);
    
    selectElem.disabled = false;
    selectElem.innerHTML = '<option value="">請選擇壇名</option>';
    
    const filteredList = allTanNames.filter(name => name.startsWith(selectedGroup));
    filteredList.forEach(name => { selectElem.innerHTML += `<option value="${name}">${name}</option>`; });
  }

  function switchPage(page) {
    document.getElementById("loginMsg").innerText = "";
    document.getElementById("regMsg").innerText = "";
    document.getElementById("forgotMsg").innerText = "";
    document.getElementById("reportMsg").innerText = "";
    
    document.getElementById("loginPage").classList.add("hidden");
    document.getElementById("registerPage").classList.add("hidden");
    document.getElementById("forgotPage").classList.add("hidden");
    document.getElementById("resetPage").classList.add("hidden");
    document.getElementById("mainMenuPage").classList.add("hidden");
    document.getElementById("addReportPage").classList.add("hidden");
    document.getElementById("queryReportPage").classList.add("hidden");

    if(page === 'register') document.getElementById("registerPage").classList.remove("hidden");
    else if(page === 'forgot') document.getElementById("forgotPage").classList.remove("hidden");
    else if(page === 'menu') {
      document.getElementById("menuUserShow").innerText = `${currentUserInfo.tanName} ─ ${currentUserInfo.realName}`;
      document.getElementById("mainMenuPage").classList.remove("hidden");
    }
    else if(page === 'addReport') {
      document.getElementById("reportUserShow").innerText = `${currentUserInfo.tanName} ─ ${currentUserInfo.realName}`;
      document.getElementById("actDate").value = new Date().toISOString().split('T')[0];
      document.getElementById("addReportPage").classList.remove("hidden");
    }
    else if(page === 'queryReport') {
      document.getElementById("queryTitleShow").innerText = `${currentUserInfo.tanName} 回報查詢`;
      document.getElementById("queryReportPage").classList.remove("hidden");
      loadMyReportList();
    }
    else document.getElementById("loginPage").classList.remove("hidden");
  }

  function logOut() {
    currentUserInfo = { group: "", tanName: "", realName: "" };
    switchPage('login');
  }

  function submitLogin() {
    const user = document.getElementById("loginUser").value.trim().toLowerCase();
    const pass = document.getElementById("loginPass").value;
    const btn = document.getElementById("loginBtn");
    const msg = document.getElementById("loginMsg");
    btn.disabled = true; btn.innerText = "驗證中..."; msg.style.color = "#e74c3c"; msg.innerText = "";
    
    fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "login", username: user, password: pass }) })
    .then(res => res.json()).then(result => {
      btn.disabled = false; btn.innerText = "登入";
      if (result.success) { 
        currentUserInfo = result.userIn;
        switchPage('menu'); 
      } else { msg.innerText = result.message; }
    }).catch(() => { btn.disabled = false; msg.innerText = "連線失敗"; });
  }

  function submitRegister() {
    const tanName = document.getElementById("regTan").value;
    const realName = document.getElementById("regName").value.trim();
    const username = document.getElementById("regUser").value.trim().toLowerCase();
    const password = document.getElementById("regPass").value.trim();
    const msg = document.getElementById("regMsg");

    if(!username.endsWith("@gmail.com")) { msg.innerText = "帳號必須為 Gmail 帳號"; return; }
    if(password.startsWith("0") || isNaN(password)) { msg.innerText = "密碼請輸入去掉開頭0的手機號碼"; return; }

    const btn = document.getElementById("regBtn");
    btn.disabled = true; btn.innerText = "審核中..."; msg.innerText = "";

    fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "register", tanName: tanName, realName: realName, username: username, password: password }) })
    .then(res => res.json()).then(result => {
      btn.disabled = false; btn.innerText = "送出申請";
      if(result.success) { alert(result.message); switchPage('login'); } else { msg.innerText = result.message; }
    }).catch(() => { btn.disabled = false; msg.innerText = "連線失敗"; });
  }

  function submitForgot() {
    const tanName = document.getElementById("forgotTan").value;
    const realName = document.getElementById("forgotName").value.trim();
    const username = document.getElementById("forgotUser").value.trim().toLowerCase();
    const msg = document.getElementById("forgotMsg");
    const btn = document.getElementById("forgotBtn");

    if(!tanName) { msg.innerText = "請選擇壇名"; return; }
    btn.disabled = true; btn.innerText = "身份驗證中..."; msg.innerText = "";

    fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "forgotPassword", tanName: tanName, realName: realName, username: username }) })
    .then(res => res.json()).then(result => {
      btn.disabled = false; btn.innerText = "確認身份並修改密碼";
      if(result.success) {
        currentResetToken = result.token;
        document.getElementById("forgotPage").classList.add("hidden");
        document.getElementById("resetPage").classList.remove("hidden");
        document.getElementById("resetTanShow").innerText = tanName;
        document.getElementById("resetNameShow").innerText = realName;
      } else { msg.innerText = result.message; }
    }).catch(() => { btn.disabled = false; msg.innerText = "連線失敗"; });
  }

  function submitResetPassword() {
    const newPass = document.getElementById("newPass").value.trim();
    const newPassConfirm = document.getElementById("newPassConfirm").value.trim();
    const msg = document.getElementById("resetMsg");
    const btn = document.getElementById("resetBtn");

    if (!checkPasswordStrength(newPass)) { 
      msg.innerText = "密碼格式錯誤：新密碼必須包含英文大小寫及數字，且長度至少8碼"; 
      return; 
    }
    if (newPass !== newPassConfirm) { msg.innerText = "變更失敗：兩次輸入的新密碼不一致！"; return; }

    btn.disabled = true; btn.innerText = "正在變更密碼..."; msg.innerText = "";

    fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "resetPassword", token: currentResetToken, newPassword: newPass }) })
    .then(res => res.json()).then(result => {
      btn.disabled = false; btn.innerText = "確認變更密碼";
      if(result.success) { alert(result.message); switchPage('login'); } else { msg.innerText = result.message; }
    }).catch(() => { btn.disabled = false; msg.innerText = "連線失敗"; });
  }

  function submitReportForm() {
    const host = document.querySelector('input[name="actHost"]:checked').value;
    const date = document.getElementById("actDate").value;
    const time = document.getElementById("actTime").value || "未填";
    const title = document.getElementById("actTitle").value.trim();
    const people = document.getElementById("actPeople").value;
    const lost = document.getElementById("actMiss").value;
    
    const msg = document.getElementById("reportMsg");
    const btn = document.getElementById("reportSubmitBtn");
    
    if(parseInt(people) < 0 || parseInt(lost) < 0) {
      msg.style.color = "#e74c3c"; msg.innerText = "人數不能為負數！"; return;
    }
    
    btn.disabled = true; btn.innerText = "正在傳送回報..."; msg.innerText = "";
    
    const reportData = {
      action: "submitReport",
      group: currentUserInfo.group,
      tanName: currentUserInfo.tanName,
      realName: currentUserInfo.realName,
      host: host,
      date: date,
      time: time,
      title: title,
      people: people,
      lost: lost
    };
    
    fetch(GAS_URL, { method: "POST", body: JSON.stringify(reportData) })
    .then(res => res.json())
    .then(result => {
      btn.disabled = false; btn.innerText = "確認送出回報";
      if(result.success) {
        msg.style.color = "#2ecc71";
        msg.innerText = result.message;
        document.getElementById("actTitle").value = "";
        document.getElementById("actPeople").value = "";
        document.getElementById("actMiss").value = "";
        document.getElementById("actTime").value = "";
        setTimeout(() => { switchPage('menu'); }, 1200);
      } else {
        msg.style.color = "#e74c3c"; msg.innerText = result.message;
      }
    }).catch(() => { btn.disabled = false; msg.style.color = "#e74c3c"; msg.innerText = "連線失敗"; });
  }

  function loadMyReportList() {
    const loadMsg = document.getElementById("queryLoadMsg");
    const container = document.getElementById("reportListContainer");
    
    loadMsg.innerText = "正在讀取回報紀錄...";
    loadMsg.classList.remove("hidden");
    container.innerHTML = "";
    
    fetch(GAS_URL, {
      method: "POST",
      body: JSON.stringify({
        action: "getMyReports",
        tanName: currentUserInfo.tanName,
        realName: currentUserInfo.realName
      })
    })
    .then(res => res.json())
    .then(result => {
      loadMsg.classList.add("hidden");
      if (result.success) {
        myFetchedReports = result.data;
        
        if (myFetchedReports.length === 0) {
          container.innerHTML = '<div class="no-data">目前本壇尚無歷史回報紀錄。</div>';
          return;
        }
        
        myFetchedReports.forEach((item, index) => {
          container.innerHTML += `
            <div class="report-item" onclick="openDetailModal(${index})">
              <div class="item-header">
                <span>📅 ${item.date}</span>
                <span>👤 ${item.realName}</span>
              </div>
              <div class="item-title">${item.title}</div>
              <div class="item-detail-summary">👥 人數：${item.people}人</div>
            </div>
          `;
        });
      } else {
        container.innerHTML = `<div class="no-data" style="color:#e74c3c">${result.message}</div>`;
      }
    })
    .catch(() => {
      loadMsg.classList.add("hidden");
      container.innerHTML = '<div class="no-data" style="color:#e74c3c">連線失敗，請檢查網路。</div>';
    });
  }

  function openDetailModal(index) {
    const report = myFetchedReports[index];
    if(!report) return;

    // 💡 修正處：將原本錯誤的欄位指引修正，讓活動時間正確對應顯示
    document.getElementById("mDate").innerText = report.date;
    document.getElementById("mTime").innerText = report.time || "未填";
    document.getElementById("mHost").innerText = report.host;
    document.getElementById("mTitle").innerText = report.title;
    document.getElementById("mPeople").innerText = report.people + " 人";
    document.getElementById("mLost").innerText = report.lost + " 人";
    document.getElementById("mReporter").innerText = report.realName;
    document.getElementById("mTimestamp").innerText = report.timestamp;

    document.getElementById("detailModal").classList.remove("hidden");
  }

  document.addEventListener('keydown', function(event) {
    if (event.key === "Escape") { closeModal(); }
  });

  function closeModal() {
    document.getElementById("detailModal").classList.add("hidden");
  }
</script>

</body>
</html>
