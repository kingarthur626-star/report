<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新莊區 誠字班 執行回報</title>
  <style>
    * { box-shadow: border-box; box-sizing: border-box; }
    body { 
      font-family: "Microsoft JhengHei", Arial, sans-serif; 
      background-color: #f5f7fa; 
      margin: 0; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      height: 100vh; 
    }
    .container { 
      width: 100%; 
      max-width: 400px; 
      padding: 30px; 
      background: #ffffff; 
      border-radius: 12px; 
      box-shadow: 0 4px 15px rgba(0,0,0,0.08); 
      text-align: center;
    }
    h2 { 
      color: #2c3e50; 
      margin-bottom: 25px; 
      font-size: 22px;
      font-weight: bold;
    }
    .input-group { 
      margin-bottom: 18px; 
      text-align: left; 
    }
    label { 
      display: block; 
      margin-bottom: 8px; 
      color: #34495e; 
      font-weight: bold;
    }
    input[type="text"], input[type="password"], input[type="email"], select { 
      width: 100%; 
      padding: 12px; 
      border: 1px solid #ccd1d9; 
      border-radius: 6px; 
      font-size: 16px; 
      background-color: #f8f9fa;
    }
    input:focus, select:focus {
      border-color: #4a90e2;
      outline: none;
      background-color: #fff;
    }
    /* 組別單選鈕的專用樣式 */
    .group-container {
      display: flex;
      justify-content: space-between;
      padding: 5px 0;
    }
    .group-option {
      display: flex;
      align-items: center;
      cursor: pointer;
      font-size: 16px;
    }
    .group-option input[type="radio"] {
      margin-right: 6px;
      width: 18px;
      height: 18px;
      cursor: pointer;
    }
    button { 
      width: 100%; 
      padding: 12px; 
      background-color: #4a90e2; 
      color: white; 
      border: none; 
      border-radius: 6px; 
      font-size: 16px; 
      font-weight: bold;
      cursor: pointer; 
      margin-top: 10px;
    }
    button:disabled { background-color: #a0a0a0; }
    .footer-links {
      margin-top: 20px;
      text-align: right;
      font-size: 14px;
    }
    .footer-links a {
      color: #4a90e2;
      text-decoration: none;
      font-weight: bold;
    }
    .footer-links a:hover { text-decoration: underline; }
    .msg { margin-top: 15px; font-size: 14px; color: #e74c3c; font-weight: bold; min-height: 20px; }
    .hidden { display: none; }
    .hint { font-size: 12px; color: #7f8c8d; margin-top: 4px; }
  </style>
</head>
<body>

<div id="loginPage" class="container">
  <h2>新莊區 誠字班<br>執行回報系統</h2>
  <form onsubmit="submitLogin(); return false;">
    <div class="input-group">
      <label>帳號：</label>
      <input type="text" id="loginUser" required placeholder="請輸入帳號">
    </div>
    <div class="input-group">
      <label>密碼：</label>
      <input type="password" id="loginPass" required placeholder="請輸入密碼">
    </div>
    <button type="submit" id="loginBtn">登入</button>
  </form>
  <div id="loginMsg" class="msg"></div>
  <div class="footer-links">
    <a href="#" onclick="switchPage('register')">申請帳號</a>
  </div>
</div>

<div id="registerPage" class="container hidden">
  <h2>申請帳號</h2>
  <form onsubmit="submitRegister(); return false;">
    
    <div class="input-group">
      <label>組別：</label>
      <div class="group-container">
        <label class="group-option">
          <input type="radio" name="groupSelect" value="1" onclick="filterTanNames()"> 第1組
        </label>
        <label class="group-option">
          <input type="radio" name="groupSelect" value="2" onclick="filterTanNames()"> 第2組
        </label>
        <label class="group-option">
          <input type="radio" name="groupSelect" value="3" onclick="filterTanNames()"> 第3組
        </label>
      </div>
    </div>

    <div class="input-group">
      <label>壇名：</label>
      <select id="regTan" required disabled>
        <option value="">請先圈選組別...</option>
      </select>
    </div>
    
    <div class="input-group">
      <label>姓名：</label>
      <input type="text" id="regName" required placeholder="請輸入真實姓名">
    </div>
    <div class="input-group">
      <label>帳號：</label>
      <input type="email" id="regUser" required placeholder="例如: example@gmail.com">
      <div class="hint">請輸入完整的 Gmail 帳號</div>
    </div>
    <div class="input-group">
      <label>密碼：</label>
      <input type="text" id="regPass" required pattern="[1-9][0-9]*" placeholder="例如: 912345678">
      <div class="hint">請輸入手機號碼，開頭不含0 (純數字)</div>
    </div>
    <button type="submit" id="regBtn">送出申請</button>
  </form>
  <div id="regMsg" class="msg"></div>
  <div class="footer-links">
    <a href="#" onclick="switchPage('login')">返回登入</a>
  </div>
</div>

<script>
  // 🔗 請在此處替換成您的全新 GAS 網頁應用程式 URL
  const GAS_URL = "https://script.google.com/macros/s/AKfycbybHYMGxikSd4rtNTVPexnpcLNBYWrOA3tyl2eKoPLYQcX1lNr_ESwJlT-XMSZgJ84B/exec";
  
  // 用來儲存從試算表抓下來的所有原始壇名資料
  let allTanNames = [];

  // 網頁載入時自動取得所有「壇名資料」
  window.onload = function() {
    fetch(GAS_URL, {
      method: "POST",
      body: JSON.stringify({ action: "getTanNames" })
    })
    .then(res => res.json())
    .then(res => {
      if(res.success) {
        allTanNames = res.data; // 暫存到全域變數
      } else {
        document.getElementById("regTan").innerHTML = '<option value="">無法載入壇名資料</option>';
      }
    })
    .catch(() => {
      document.getElementById("regTan").innerHTML = '<option value="">網路連線異常</option>';
    });
  };

  // 🟢 根據選擇的組別，過濾並更新壇名下拉選單
  function filterTanNames() {
    // 取得被圈選的組別數值 ("1" 或 "2" 或 "3")
    const selectedGroup = document.querySelector('input[name="groupSelect"]:checked').value;
    const selectElem = document.getElementById("regTan");
    
    // 啟用下拉選單
    selectElem.disabled = false;
    selectElem.innerHTML = '<option value="">請選擇壇名</option>';
    
    // 過濾出開頭符合該數字的壇名
    const filteredList = allTanNames.filter(name => name.startsWith(selectedGroup));
    
    if(filteredList.length > 0) {
      filteredList.forEach(name => {
        selectElem.innerHTML += `<option value="${name}">${name}</option>`;
      });
    } else {
      selectElem.innerHTML += `<option value="">查無開頭為 ${selectedGroup} 的壇名</option>`;
    }
  }

  // 頁面切換邏輯
  function switchPage(page) {
    document.getElementById("loginMsg").innerText = "";
    document.getElementById("regMsg").innerText = "";
    if(page === 'register') {
      document.getElementById("loginPage").classList.add("hidden");
      document.getElementById("registerPage").classList.remove("hidden");
    } else {
      document.getElementById("registerPage").classList.add("hidden");
      document.getElementById("loginPage").classList.remove("hidden");
    }
  }

  // 執行登入
  function submitLogin() {
    const user = document.getElementById("loginUser").value;
    const pass = document.getElementById("loginPass").value;
    const btn = document.getElementById("loginBtn");
    const msg = document.getElementById("loginMsg");
    
    btn.disabled = true;
    btn.innerText = "驗證中...";
    msg.innerText = "";
    
    fetch(GAS_URL, {
      method: "POST",
      body: JSON.stringify({ action: "login", username: user, password: pass })
    })
    .then(res => res.json())
    .then(result => {
      btn.disabled = false;
      btn.innerText = "登入";
      if (result.success) {
        msg.style.color = "#2ecc71";
        msg.innerText = result.message;
        alert("登入成功！即將進入回報頁面。");
      } else {
        msg.style.color = "#e74c3c";
        msg.innerText = result.message;
      }
    })
    .catch(() => {
      btn.disabled = false;
      btn.innerText = "登入";
      msg.innerText = "連線失敗";
    });
  }

  // 執行註冊申請
  function submitRegister() {
    const tanName = document.getElementById("regTan").value;
    const realName = document.getElementById("regName").value.trim();
    const username = document.getElementById("regUser").value.trim();
    const password = document.getElementById("regPass").value.trim();
    const btn = document.getElementById("regBtn");
    const msg = document.getElementById("regMsg");

    if(!tanName) {
      msg.innerText = "請先選擇您的壇名";
      return;
    }
    if(!username.endsWith("@gmail.com")) {
      msg.innerText = "帳號必須為 Gmail 帳號 (需包含 @gmail.com)";
      return;
    }
    if(password.startsWith("0") || isNaN(password)) {
      msg.innerText = "密碼格式錯誤：請輸入去掉開頭0的手機號碼";
      return;
    }

    btn.disabled = true;
    btn.innerText = "審核名單中...";
    msg.innerText = "";

    fetch(GAS_URL, {
      method: "POST",
      body: JSON.stringify({
        action: "register",
        tanName: tanName,
        realName: realName,
        username: username,
        password: password
      })
    })
    .then(res => res.json())
    .then(result => {
      btn.disabled = false;
      btn.innerText = "送出申請";
      if(result.success) {
        alert(result.message);
        document.getElementById("loginUser").value = username; 
        switchPage('login');
      } else {
        msg.style.color = "#e74c3c";
        msg.innerText = result.message;
      }
    })
    .catch(() => {
      btn.disabled = false;
      btn.innerText = "送出申請";
      msg.innerText = "連線失敗";
    });
  }
</script>

</body>
</html>
